<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0d0b1a" />
    <link rel="manifest" href="manifest.webmanifest" />
    <title>Nuance · 语差</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* 手机网页版：popup 在浏览器里是固定小宽度，这里放开成自适应全屏。
         styles.css 给扩展弹窗写死了 body{width:460px}，网页版必须覆盖掉，否则整页锁死成窄栏。 */
      html, body {
        margin: 0;
        width: 100%;
        max-width: 100%;
        min-height: 100vh;
        /* 用 clip 而非 hidden：只裁掉横向溢出（背景流光），
           不会把 html/body 变成滚动容器——用 hidden 会让 overflow-y 被强制算成 auto，
           html 和 body 都成了滚动容器，桌面端整页就滚不动了。 */
        overflow-x: clip;
        overscroll-behavior-y: none;   /* 禁掉下拉回弹，去掉「网页划来划去」的感觉 */
      }
      .app {
        max-width: 640px;
        width: 100%;
        margin: 0 auto;              /* 宽屏时居中，窄屏时占满 */
        min-height: 100vh;
        box-sizing: border-box;
        padding: 12px 16px calc(16px + env(safe-area-inset-bottom));
      }
      .aurora { inset: -30% -10% auto -10%; }
      /* 触摸友好：输入框和按钮在手机上更高、字更大，避免 iOS 聚焦时自动放大 */
      .textarea { min-height: 120px; font-size: 16px; }
      .scene-select { font-size: 16px; padding: 8px 12px; }
      .button { padding: 10px 24px; font-size: 16px; }
      .result-text { font-size: 15px; }
      /* 每组「标签+下拉」的容器；宽屏时横向自适应，窄屏时纵向堆叠 */
      .scene-row .scene-field { display: flex; align-items: center; gap: 6px; flex: 1 1 auto; min-width: 0; }
      .scene-row .scene-field .scene-select { flex: 1; }
      /* 窄屏（手机）：整体放松间距，去掉「挤」的观感 */
      @media (max-width: 560px) {
        .app { padding: 12px 14px calc(16px + env(safe-area-inset-bottom)); }
        .panel { padding: 16px; border-radius: 20px; margin-bottom: 14px; }
        .textarea { min-height: 132px; }
        /* 场景/语气/严格度：每组「标签+下拉」独立成块、纵向堆叠，标签不再和下拉挤在一行 */
        .scene-row { flex-wrap: wrap; gap: 12px; margin-top: 14px; }
        .scene-row .scene-field {
          flex: 1 1 calc(50% - 6px); display: flex; flex-direction: column;
          align-items: stretch; gap: 5px; min-width: 0;
        }
        .scene-row .scene-field .scene-label { font-size: 12px; }
        .scene-row .scene-field .scene-select { width: 100%; }
        .action-row { margin-top: 16px; gap: 10px; }
      }
    </style>
  </head>
  <body>
    <div class="aurora"></div>
    <main class="app">
      <div class="brand">
        <span class="brand-logo" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="28" height="28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="nuanceGrad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
                <stop stop-color="#7c5cff"/>
                <stop offset="1" stop-color="#c44bff"/>
              </linearGradient>
            </defs>
            <rect x="2" y="2" width="28" height="28" rx="9" fill="url(#nuanceGrad)"/>
            <path d="M10 22V10l12 12V10" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="brand-name">Nuance</span>
        <span class="brand-zh">语差</span>
        <a id="openCollection" class="collection-link brand-collection" href="collection.html">我的收藏 ›</a>
        <a id="openScene" class="collection-link brand-collection" href="scene.html">场景预演 ›</a>
      </div>

      <section class="panel" aria-label="翻译输入">
        <textarea
          id="sourceText"
          class="textarea"
          rows="3"
          placeholder="用英文说一句话，练习地道表达......"
        ></textarea>

        <div class="scene-row">
          <div class="scene-field">
            <label class="scene-label" for="sceneSelect">场景</label>
            <select id="sceneSelect" class="scene-select">
              <option value="">通用</option>
              <option value="面试">面试</option>
              <option value="客户沟通">客户沟通</option>
              <option value="向老板汇报">向老板汇报</option>
              <option value="恋爱聊天">恋爱聊天</option>
              <option value="论文写作">论文写作</option>
              <option value="工作邮件">工作邮件</option>
            </select>
          </div>
          <div class="scene-field">
            <label class="scene-label" for="toneSelect">语气</label>
            <select id="toneSelect" class="scene-select">
              <option value="">自然</option>
              <option value="礼貌">礼貌</option>
              <option value="专业">专业</option>
              <option value="友好">友好</option>
              <option value="热情">热情</option>
              <option value="强势">强势</option>
              <option value="简洁">简洁</option>
              <option value="委婉">委婉</option>
            </select>
          </div>
          <div class="scene-field">
            <label class="scene-label" for="strictnessSelect">严格度</label>
            <select id="strictnessSelect" class="scene-select">
              <option value="strict">严格挑剔</option>
              <option value="easy">鼓励务实</option>
            </select>
          </div>
        </div>

        <div class="action-row">
          <span id="directionBadge" class="direction-hint"></span>
          <button id="translateButton" class="button button-primary" type="button">翻译</button>
          <button id="tutorButton" class="button button-accent" type="button">说的对吗？</button>
        </div>
      </section>

      <section class="panel result-panel" aria-label="输出结果">
        <div class="result-head">
          <span class="result-label">结果</span>
          <div class="result-tools">
            <button id="saveButton" class="tool-btn tool-save" type="button" title="收藏这条润色" hidden>☆ 收藏</button>
            <button id="copyButton" class="tool-btn tool-copy" type="button" title="复制" disabled>⧉ 复制</button>
          </div>
        </div>
        <div id="resultText" class="result-text" aria-live="polite">
          翻译或润色结果......
        </div>
      </section>
    </main>

    <script src="config.js"></script>
    <script src="auth.js"></script>
    <script src="sync.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
