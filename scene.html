<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0d0b1a" />
    <link rel="manifest" href="manifest.webmanifest" />
    <title>Rehearse · 预演 — 场景原型</title>
    <style>
      :root {
        --violet: #7c5cff;
        --violet-deep: #5b3fd6;
        --accent: #c44bff;
        --ink: #1b1733;
        --muted: #6f6a8a;
        --glass: rgba(255, 255, 255, 0.62);
        --glass-strong: rgba(255, 255, 255, 0.8);
        --glass-border: rgba(255, 255, 255, 0.7);
        --shadow: 0 16px 40px rgba(70, 40, 160, 0.16);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
        background: radial-gradient(120% 80% at 10% 0%, #efe6ff 0%, #e7ecff 45%, #f3edff 100%);
        position: relative;
        overflow-x: hidden;
        overscroll-behavior-y: none;
      }
      .aurora {
        position: fixed;
        inset: -30% -20% auto -20%;
        height: 420px;
        background:
          radial-gradient(40% 60% at 25% 30%, rgba(124, 92, 255, 0.5), transparent 70%),
          radial-gradient(35% 55% at 75% 20%, rgba(196, 75, 255, 0.4), transparent 70%),
          radial-gradient(45% 60% at 55% 70%, rgba(92, 140, 255, 0.36), transparent 70%);
        filter: blur(40px);
        z-index: 0;
        pointer-events: none;
      }
      .wrap { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 32px 32px 80px; }
      .brand { display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px; }
      .home-link {
        color: var(--violet-deep); font-size: 13px; font-weight: 700;
        text-decoration: none; margin-left: auto; align-self: center;
      }
      .home-link:hover { text-decoration: underline; }
      .brand-name {
        font-size: 26px; font-weight: 800; letter-spacing: -0.01em;
        background: linear-gradient(120deg, var(--violet), var(--accent));
        -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      }
      .brand-zh { font-size: 14px; font-weight: 700; color: var(--muted); letter-spacing: 0.14em; }
      .tagline { color: var(--muted); font-size: 14px; margin: 0 0 20px; }
      .panel {
        background: var(--glass); backdrop-filter: blur(18px);
        border: 1px solid var(--glass-border); border-radius: 18px;
        box-shadow: var(--shadow); padding: 16px; margin-bottom: 18px;
      }
      .input-row { display: flex; gap: 10px; }
      #sceneInput {
        flex: 1; border: 1px solid var(--glass-border); border-radius: 12px;
        background: var(--glass-strong); padding: 12px 14px; font-size: 15px; color: var(--ink);
        font-family: inherit; outline: none;
      }
      #sceneInput:focus { border-color: var(--violet-soft); }
      .btn {
        border: none; border-radius: 12px; padding: 0 20px; font-size: 15px; font-weight: 700;
        color: #fff; cursor: pointer; background: linear-gradient(120deg, var(--violet), var(--accent));
        box-shadow: 0 8px 20px rgba(124, 92, 255, 0.35); transition: transform .08s;
      }
      .btn:active { transform: translateY(1px); }
      .btn:disabled { opacity: .55; cursor: default; }
      .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
      .chip {
        font-size: 13px; color: var(--violet-deep); background: rgba(124, 92, 255, 0.1);
        border: 1px solid rgba(124, 92, 255, 0.2); border-radius: 999px; padding: 5px 12px; cursor: pointer;
      }
      .chip:hover { background: rgba(124, 92, 255, 0.18); }
      .status { color: var(--muted); font-size: 14px; padding: 8px 4px; }
      .section-title {
        display: flex; align-items: center; gap: 8px; margin: 4px 0 14px;
        font-size: 16px; font-weight: 800; color: var(--ink);
      }
      .section-title .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
      .section-title .spacer { flex: 1; }
      .save-all {
        border: none; border-radius: 10px; padding: 6px 14px; font-size: 13px; font-weight: 700;
        color: #fff; cursor: pointer; background: linear-gradient(120deg, var(--violet), var(--accent));
        box-shadow: 0 6px 14px rgba(124, 92, 255, 0.3);
      }
      .save-all:active { transform: translateY(1px); }
      .save-all:disabled { opacity: .55; cursor: default; }
      .scene-label {
        display: inline-block; font-size: 13px; font-weight: 700; color: var(--violet-deep);
        background: rgba(124, 92, 255, 0.12); border-radius: 8px; padding: 4px 10px; margin-bottom: 14px;
      }
      /* 双栏：左剧本、右卡片，整页自然滚动，不在容器内单独滚 */
      .stage { display: grid; grid-template-columns: 5fr 7fr; gap: 28px; align-items: start; }
      @media (max-width: 900px) { .stage { grid-template-columns: 1fr; } }
      .col { display: flex; flex-direction: column; }
      /* 剧本 */
      .turn { display: flex; gap: 10px; margin-bottom: 18px; }
      .turn.me { flex-direction: row-reverse; }
      .turn .who {
        flex: 0 0 auto; font-size: 11px; font-weight: 700; padding-top: 4px; white-space: nowrap;
      }
      .turn.them .who { color: #1f7a5a; }
      .turn.me .who { color: var(--violet-deep); }
      .turn .bubble {
        max-width: 88%; border-radius: 14px; padding: 12px 16px; border: 1px solid transparent;
      }
      /* 对方 = 绿色系，我 = 紫色系，颜色明确区分 */
      .turn.them .bubble { background: rgba(31, 157, 107, 0.1); border-color: rgba(31, 157, 107, 0.22); }
      .turn.me .bubble { background: rgba(124, 92, 255, 0.12); border-color: rgba(124, 92, 255, 0.24); }
      .turn .en { font-size: 16px; line-height: 1.6; }
      .turn .zh { font-size: 13px; color: var(--muted); margin-top: 6px; }
      /* 朗读小按钮：剧本气泡与卡片通用 */
      .speak {
        border: none; background: none; cursor: pointer; font-size: 16px; line-height: 1;
        color: var(--violet); opacity: .55; padding: 2px 4px;
      }
      .speak:hover { opacity: 1; }
      .bubble-head { display: flex; align-items: flex-start; gap: 6px; }
      .bubble-head .en { flex: 1; }
      /* 剧本气泡上的收藏按钮 */
      .turn .bubble-actions { display: flex; gap: 2px; }
      .turn .b-save {
        border: none; background: none; cursor: pointer; font-size: 15px; line-height: 1;
        color: var(--violet); opacity: .5; padding: 2px 4px;
      }
      .turn .b-save:hover { opacity: 1; }
      .turn .b-save.saved { opacity: 1; }
      .turn .b-save.saving { opacity: .8; }
      /* 卡片：右栏两列网格 */
      .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
      @media (max-width: 900px) { .cards { grid-template-columns: 1fr 1fr; } }
      @media (max-width: 560px) { .cards { grid-template-columns: 1fr; } }
      .card {
        background: var(--glass-strong); border: 1px solid var(--glass-border);
        border-radius: 14px; padding: 14px; position: relative; display: flex; flex-direction: column; gap: 6px;
      }
      .card-tags { display: flex; gap: 6px; }
      .card .badge {
        font-size: 11px; font-weight: 700; border-radius: 6px; padding: 2px 8px;
      }
      .card.phrase .badge { color: var(--violet-deep); background: rgba(124, 92, 255, 0.14); }
      .card.word .badge { color: #1f7a5a; background: rgba(31, 157, 107, 0.14); }
      /* 来源标记：me / them 与剧本气泡同色系，一眼对应 */
      .card .src { font-size: 11px; font-weight: 700; border-radius: 6px; padding: 2px 8px; }
      .card .src.me { color: var(--violet-deep); background: rgba(124, 92, 255, 0.1); }
      .card .src.them { color: #1f7a5a; background: rgba(31, 157, 107, 0.1); }
      .card .intent { font-size: 13px; color: var(--muted); }
      .card .better { font-size: 15px; font-weight: 700; line-height: 1.45; }
      .card .construct {
        font-size: 13px; color: var(--violet-deep); font-family: ui-monospace, monospace;
        background: rgba(124, 92, 255, 0.08); border-radius: 8px; padding: 6px 8px;
      }
      .card .note { font-size: 12px; color: var(--muted); line-height: 1.5; }
      .card .save {
        position: absolute; top: 12px; right: 12px; border: none; background: none;
        font-size: 18px; cursor: pointer; color: var(--violet); opacity: .6;
      }
      .card .save:hover { opacity: 1; }
      .card .save.saved { opacity: 1; }
      .card .better-row { display: flex; align-items: flex-start; gap: 6px; }
      .card .better-row .better { flex: 1; }
      .hidden { display: none; }
      /* ===== 对话演练入口：标题栏右端的链接式按钮 ===== */
      .chat-link {
        font-size: 13px; font-weight: 800; color: var(--violet-deep); cursor: pointer;
        text-decoration: none; padding: 4px 6px; border-radius: 8px; transition: color .14s, background .14s;
      }
      .chat-link:hover { color: var(--accent); background: rgba(124, 92, 255, 0.1); }
      /* ===== 历史话题 ===== */
      .history { margin: -6px 0 18px; }
      .history-title { font-size: 13px; font-weight: 700; color: var(--muted); margin: 0 2px 8px; }
      .history-item {
        display: inline-flex; align-items: center; gap: 6px; margin: 0 8px 8px 0;
        background: var(--glass-strong); border: 1px solid var(--glass-border); border-radius: 999px;
        padding: 6px 6px 6px 14px; font-size: 13px; cursor: pointer; transition: border-color .14s;
      }
      .history-item:hover { border-color: var(--violet-soft); }
      .history-item .hi-scene { color: var(--violet-deep); font-weight: 600; }
      .history-item .hi-del {
        border: none; background: rgba(124,92,255,0.1); color: var(--muted); cursor: pointer;
        width: 20px; height: 20px; border-radius: 50%; font-size: 11px; line-height: 1;
      }
      .history-item .hi-del:hover { background: rgba(214,51,108,0.16); color: var(--error, #d6336c); }
      .toast {
        position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
        background: rgba(27, 23, 51, 0.9); color: #fff; padding: 10px 18px; border-radius: 999px;
        font-size: 14px; z-index: 5; opacity: 0; transition: opacity .2s; pointer-events: none;
      }
      .toast.show { opacity: 1; }
    </style>
  </head>
  <body>
    <div class="aurora"></div>
    <div class="wrap">
      <div class="brand">
        <span class="brand-name">Rehearse</span>
        <span class="brand-zh">预演</span>
        <a class="home-link" href="/" title="返回首页">‹ 首页</a>
      </div>
      <p class="tagline">说出你接下来要面对的场景，我先帮你把这场对话走一遍。</p>

      <section class="panel">
        <div class="input-row">
          <input
            id="sceneInput"
            type="text"
            placeholder="例如：下周去美国银行办理开户"
            autofocus
          />
          <button id="goBtn" class="btn" type="button">预演</button>
        </div>
        <div class="chips" id="chips">
          <span class="chip">看牙医，描述牙疼</span>
          <span class="chip">机场转机问询登机口</span>
          <span class="chip">租房时和房东谈合同</span>
          <span class="chip">面试官沟通，求职开发岗位</span>

        </div>
      </section>

      <!-- 历史话题：搜索过的话题缓存，点开直接展示，不重新调接口 -->
      <section id="history" class="history hidden"></section>

      <div id="status" class="status hidden"></div>

      <section id="stage" class="stage hidden">
        <div class="col">
          <div class="section-title">
            <span class="dot"></span>对话预演
            <span class="spacer"></span>
            <a id="startChatBtn" class="chat-link" role="button" tabindex="0">对话演练 ›</a>
          </div>
          <span id="sceneLabel" class="scene-label"></span>
          <div id="dialogue"></div>
        </div>
        <div class="col">
          <div class="section-title">
            <span class="dot"></span>带走这些表达
            <span class="spacer"></span>
            <button id="saveAllBtn" class="save-all" type="button">★ 一键收藏</button>
          </div>
          <div id="cards" class="cards"></div>
        </div>
      </section>
    </div>
    <div id="toast" class="toast"></div>

    <script src="auth.js"></script>
    <script src="scene.js"></script>
  </body>
</html>
